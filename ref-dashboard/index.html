
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMTEMPO ENGENHARIA | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Deep Tectonic Theme */
            --bg-void: #030504;
            --bg-depth: #081210;
            --bg-surface: #0e1a17;
            --bg-glass: rgba(14, 26, 23, 0.7);
            
            --copper-500: #C98B2A;
            --copper-400: #E0A63B;
            --copper-glow: rgba(201, 139, 42, 0.15);
            
            --patina-500: #2A9D8F;
            --patina-glow: rgba(42, 157, 143, 0.15);
            
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(201, 139, 42, 0.3);
            
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-void);
            background-image: 
                radial-gradient(circle at 50% 0%, #1a2e29 0%, transparent 40%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            color: #E0E0E0;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .font-tech {
            font-family: 'Rajdhani', sans-serif;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .glass-highlight {
            border-color: var(--border-highlight);
            box-shadow: 0 0 20px var(--copper-glow);
        }

        /* Staggered Animation System */
        .animate-enter {
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            animation: enter var(--ease-out-expo) 0.8s forwards;
        }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }

        @keyframes enter {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-void);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--copper-500);
            border-radius: 0px;
        }
    </style>
